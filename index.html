                "name": "What is obs-unified?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "obs-unified is an open-source, self-hosted observability platform. A single collector service ingests OpenTelemetry traces, structured logs, LLM/AI call records, frontend usage events, and rrweb session replays, stores them in D1 (SQLite) and R2, and serves a React dashboard for querying and correlating them."
                }
              },
              {
                "@type": "Question",
                "name": "How is obs-unified different from Datadog, Sentry, or PostHog?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "obs-unified runs on your own infrastructure with no external telemetry vendor. It unifies the signal types that those tools split across separate products — APM traces, logs, error tracking, product analytics, session replay, and LLM observability — into one collector and one dashboard, correlated through a single identity chain (user → session → interaction → trace → span)."
                }
              },
              {
                "@type": "Question",
                "name": "What runtimes does obs-unified support?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "The collector runs on Cloudflare Workers (D1 + R2) or any Node.js / Bun / Deno host with SQLite. SDKs ship for Node.js / TypeScript (Workers, Hono, Next.js, Express), Go, and Rust. Frontend instrumentation is a vanilla browser SDK with a React wrapper."
                }
              },
              {
                "@type": "Question",
                "name": "Is obs-unified free and open source?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. obs-unified is MIT-licensed and the full source code lives at github.com/obs-unified/obs-unified, including the collector, SDKs, dashboard, and OpenTelemetry Astronomy Shop demo wiring."
                }
              },
              {
                "@type": "Question",
                "name": "How do I install obs-unified?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Install the SDKs with npm install @obs-unified/telemetry-sdk @obs-unified/analytics-sdk, deploy the @obs-unified/collector package to Cloudflare Workers or any Node host, set INGEST_KEY and DASHBOARD_PASSWORD, and call initObservability() in your backend. The dashboard is served by the collector at /dashboard."
                }
