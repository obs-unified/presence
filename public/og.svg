<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0d10"/>
      <stop offset="100%" stop-color="#11141a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7aa2ff"/>
      <stop offset="100%" stop-color="#5dd39e"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="0%" r="50%">
      <stop offset="0%" stop-color="#7aa2ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7aa2ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#5dd39e" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#5dd39e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- subtle grid -->
  <g stroke="#1a1f29" stroke-width="1" opacity="0.6">
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="510" x2="1200" y2="510"/>
  </g>

  <!-- brand row -->
  <g transform="translate(80, 80)">
    <rect width="56" height="56" rx="14" fill="#7aa2ff" opacity="0.12"/>
    <g transform="translate(28, 28)" stroke="#7aa2ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <circle cx="0" cy="0" r="4"/>
      <path d="M -10 0 h -4 M 10 0 h 4 M 0 -10 v -4 M 0 10 v 4 M -7 -7 l -3 -3 M 7 7 l 3 3 M -7 7 l -3 3 M 7 -7 l 3 -3"/>
    </g>
    <text x="80" y="38" fill="#e6e9ef" font-family="ui-sans-serif, system-ui, -apple-system, Inter, Segoe UI, sans-serif" font-size="26" font-weight="600" letter-spacing="-0.4">obs-unified</text>
  </g>

  <!-- eyebrow -->
  <text x="80" y="220" fill="#7aa2ff" font-family="ui-sans-serif, system-ui, -apple-system, Inter, sans-serif" font-size="18" font-weight="600" letter-spacing="2.4">SELF-HOSTED OBSERVABILITY · MIT</text>

  <!-- headline -->
  <text x="80" y="300" fill="#e6e9ef" font-family="ui-sans-serif, system-ui, -apple-system, Inter, sans-serif" font-size="72" font-weight="700" letter-spacing="-1.6">Every signal,</text>
  <text x="80" y="386" fill="url(#accent)" font-family="ui-sans-serif, system-ui, -apple-system, Inter, sans-serif" font-size="72" font-weight="700" letter-spacing="-1.6">two clicks away.</text>

  <!-- subhead -->
  <text x="80" y="450" fill="#8a93a3" font-family="ui-sans-serif, system-ui, -apple-system, Inter, sans-serif" font-size="24" font-weight="400">Traces · Logs · AI calls · Replay · Usage · Alerts · Profiles</text>

  <!-- identity chain mono -->
  <text x="80" y="555" fill="#6b7280" font-family="ui-monospace, SFMono-Regular, JetBrains Mono, Menlo, monospace" font-size="20">user_id → session_id → interaction_id → trace_id → span_id</text>

  <!-- url -->
  <text x="80" y="595" fill="#5a6473" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16">obsunified.com</text>

  <!-- right side: stacked signal tags as a visual -->
  <g transform="translate(760, 200)" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" font-weight="700" letter-spacing="1.2">
    <g transform="translate(0, 0)"><rect width="120" height="34" rx="6" fill="#7aa2ff" opacity="0.16"/><text x="60" y="22" fill="#7aa2ff" text-anchor="middle">TRACE</text></g>
    <g transform="translate(140, 30)"><rect width="120" height="34" rx="6" fill="#8b99ad" opacity="0.18"/><text x="60" y="22" fill="#b6c0cd" text-anchor="middle">LOG</text></g>
    <g transform="translate(280, 60)"><rect width="120" height="34" rx="6" fill="#f48fb1" opacity="0.16"/><text x="60" y="22" fill="#f48fb1" text-anchor="middle">AI</text></g>
    <g transform="translate(0, 70)"><rect width="120" height="34" rx="6" fill="#5dd39e" opacity="0.14"/><text x="60" y="22" fill="#5dd39e" text-anchor="middle">INTERACTION</text></g>
    <g transform="translate(140, 100)"><rect width="120" height="34" rx="6" fill="#b39ddb" opacity="0.18"/><text x="60" y="22" fill="#b39ddb" text-anchor="middle">REPLAY</text></g>
    <g transform="translate(280, 130)"><rect width="120" height="34" rx="6" fill="#f7c948" opacity="0.16"/><text x="60" y="22" fill="#f7c948" text-anchor="middle">ALERT</text></g>
    <g transform="translate(140, 170)"><rect width="120" height="34" rx="6" fill="#7aa2ff" opacity="0.10"/><text x="60" y="22" fill="#9bb8ff" text-anchor="middle">PROFILE</text></g>
  </g>
</svg>
