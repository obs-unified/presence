            "@id": "https://obsunified.com/#faq",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "What is obs-unified?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "obs-unified is an open-source, self-hosted observability platform. A single collector service ingests OpenTelemetry traces, structured logs, LLM/AI call records, frontend usage events, and rrweb session replays, stores them in Cloudflare D1/R2 or Postgres/S3-compatible storage, and serves a dashboard for querying and correlating them."
                }
              },
              {
                "@type": "Question",
                "name": "How is it different from Datadog, Sentry, or PostHog?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "It runs on your own infrastructure with no external telemetry vendor. It unifies signal types that those tools split across separate products — APM traces, logs, product analytics, session replay, AI observability, and alerting — into one collector and one dashboard, correlated through a single identity chain (user → session → interaction → trace → span)."
                }
              },
              {
                "@type": "Question",
                "name": "What is the data retention model?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Retention is controlled by RETENTION_HOURS on the collector and defaults to 72 hours. Profile blobs have a separate PROFILE_RETENTION_HOURS override. Because data lives in your storage account, you set the policy and pay the storage directly — no per-event retention tier to negotiate."
                }
              },
              {
                "@type": "Question",
                "name": "When do I outgrow D1, and what is the upgrade path?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "D1's row-store is comfortable up to roughly 100M hot rows; the binding constraints are metric cardinality and profile sample metadata. Profile blobs are kept in R2 with only small metadata rows in D1 to push the ceiling further. For larger or non-Cloudflare installs, the Node collector uses Postgres plus S3-compatible blob storage."
                }
              },
              {
                "@type": "Question",
                "name": "How does it handle PII and GDPR?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Self-hosting is the headline answer: data never leaves your infrastructure. On top of that, the usage pipeline default-redacts fields named like email, token, password, authorization, or cookie before storage. Session replays use rrweb, which masks input fields by default and supports per-element block/mask attributes."
                }
              },
              {
                "@type": "Question",
                "name": "Does it support SSO or multi-user dashboards?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Not today. Two auth boundaries ship: a write-only ingest API key for SDKs and a single password for the dashboard. Multi-user, RBAC, and SSO are out of scope and tracked separately. Most teams put the dashboard behind their existing identity proxy in the meantime."
                }
              },
              {
                "@type": "Question",
                "name": "Can I migrate from Datadog, Sentry, or PostHog?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Sentry and PostHog have step-by-step migration guides covering concept mapping, SDK swap, and identity backfill via /v1/identify. For Datadog, OTLP-native ingest accepts the standard OpenTelemetry SDK over OTLP HTTP, so traces and logs are a config change; a dedicated walkthrough is coming."
                }
              },
              {
                "@type": "Question",
                "name": "Does it work with my existing OpenTelemetry SDK?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes. The collector accepts OTLP over HTTP (JSON and protobuf, with gzip). gRPC is intentionally not supported — Cloudflare Workers can't host it, and OTLP HTTP covers every official SDK. The first-party SDKs are thin wrappers that configure the standard OpenTelemetry SDK to point at the collector and add OpenInference helpers for LLM spans."
                }
              },
              {
                "@type": "Question",
                "name": "Is it free and open source?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes — MIT-licensed. You pay only for the infrastructure you run it on: Cloudflare Workers + D1 + R2, or the Node collector with Postgres + S3-compatible storage."
                }
              }
            ]
